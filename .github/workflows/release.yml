name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Lint
        run: |
          bash -n muxc
          shellcheck muxc

      - name: Package
        run: |
          mkdir -p dist
          cp muxc dist/muxc
          cd dist && sha256sum muxc > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${VERSION}" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "## Changelog"
            echo "${CHANGELOG}"
            echo ""
            echo "## Install"
            echo '```sh'
            echo "curl -fsSL https://raw.githubusercontent.com/RandomCodeSpace/muxc/${VERSION}/muxc | install -m 755 /dev/stdin ~/.local/bin/muxc"
            echo '```'
            echo ""
            echo "## Checksums"
            echo '```'
            cat dist/checksums.txt
            echo '```'
          } > /tmp/release-notes.md
          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md
