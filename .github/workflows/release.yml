name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          LDFLAGS="-s -w -X github.com/RandomCodeSpace/muxc/cmd.version=${VERSION}"
          mkdir -p dist

          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for target in $TARGETS; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            OUTPUT="dist/muxc-${GOOS}-${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags "$LDFLAGS" -o "$OUTPUT" .
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum muxc-* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-v:refname | head -2 | tail -1)"
