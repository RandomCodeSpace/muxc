name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.6)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          LDFLAGS="-s -w -X github.com/RandomCodeSpace/muxc/cmd.version=${VERSION}"
          mkdir -p dist

          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for target in $TARGETS; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            OUTPUT="dist/muxc-${GOOS}-${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags "$LDFLAGS" -o "$OUTPUT" .
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum muxc-* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --generate-notes
